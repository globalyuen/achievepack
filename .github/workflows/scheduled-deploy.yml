name: Scheduled Vercel Production Deployment

on:
  schedule:
    # Run everyday at 23:00 UTC, which is exactly 7:00 AM HKT (Hong Kong Time)
    - cron: '0 23 * * *'
  workflow_dispatch:
    # Allows manually triggering the daily deployment from the GitHub Actions UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (Production)
        run: |
          vercel deploy --prod --yes \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --build-env DEPLOY_SCHEDULED=true
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
