<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Shadow for Cards -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1C1917" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="#FAFAF9" rx="16"/>

  <!-- Top Ribbon -->
  <path d="M 0,0 L 800,0 L 800,16 Q 800,0 784,0 Z" fill="#1B5E20" />

  <!-- Header -->
  <g transform="translate(40, 60)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1B5E20" letter-spacing="0.1em">ACHIEVE PACK &bull; METROLOGY STANDARDS</text>
    <text x="0" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#1C1917" letter-spacing="-0.02em">Plastic Film Thickness Measurement</text>
    <text x="0" y="56" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#78716C">Why we recommend a Precision Micrometer over standard Calipers</text>
  </g>

  <!-- Side-by-Side Comparison Grid -->
  
  <!-- MICROMETER (RECOMMENDED ✅) -->
  <g transform="translate(40, 160)" filter="url(#shadow)">
    <rect width="340" height="490" rx="16" fill="#FFFFFF" stroke="#A5D6A7" stroke-width="2"/>
    <rect width="340" height="8" rx="4" fill="#1B5E20"/>
    
    <g transform="translate(24, 30)">
      <!-- Title & Recommended Badge -->
      <g transform="translate(0, 10)">
        <rect width="180" height="28" rx="14" fill="#E8F5E9"/>
        <text x="90" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1B5E20" text-anchor="middle">RECOMMENDED &bull; ACCURATE</text>
      </g>
      
      <text x="0" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#1B5E20">Spiral Micrometer</text>
      <text x="0" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#78716C">Professional metrology instrument</text>

      <!-- Vector Illustration of Micrometer Anvil -->
      <g transform="translate(40, 120)">
        <!-- Micrometer base block -->
        <rect x="0" y="40" width="80" height="25" rx="4" fill="#D6D3D1"/>
        <path d="M 0,20 L 0,65 L -45,65 C -75,65 -75,-10 -45,-10 L 0,-10 L 0,10" fill="none" stroke="#D6D3D1" stroke-width="16" stroke-linecap="round"/>
        <!-- Anvil left -->
        <rect x="-48" y="0" width="12" height="15" fill="#44403C"/>
        <!-- Spindle right -->
        <rect x="-18" y="0" width="18" height="15" fill="#78716C"/>
        <rect x="0" y="-4" width="60" height="23" fill="#D6D3D1" stroke="#44403C" stroke-width="1"/>
        <!-- Plastic Bag representation (Clear sheet held in spindle) -->
        <rect x="-30" y="-20" width="12" height="60" fill="#4A90E2" opacity="0.6"/>
        <line x1="-30" y1="-20" x2="-30" y2="40" stroke="#4A90E2" stroke-width="1"/>
        <line x1="-18" y1="-20" x2="-18" y2="40" stroke="#4A90E2" stroke-width="1"/>
        <!-- Text details -->
        <text x="-24" y="-30" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#4A90E2" text-anchor="middle">Film</text>
      </g>

      <!-- Key Benefits Checklist -->
      <g transform="translate(0, 260)">
        <!-- Bullet 1 -->
        <circle cx="10" cy="10" r="8" fill="#1B5E20"/>
        <path d="M 7,10 L 9,12 L 13,8" fill="none" stroke="#FFFFFF" stroke-width="2"/>
        <text x="26" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1917">Extreme Precision: 0.01mm</text>
        <text x="26" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#78716C">Direct high-accuracy scale dial</text>

        <!-- Bullet 2 -->
        <circle cx="10" cy="60" r="8" fill="#1B5E20"/>
        <path d="M 7,60 L 9,62 L 13,58" fill="none" stroke="#FFFFFF" stroke-width="2"/>
        <text x="26" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1917">Zero Film Compression</text>
        <text x="26" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#78716C">Ratchet micro-stop prevents deforming</text>

        <!-- Bullet 3 -->
        <circle cx="10" cy="110" r="8" fill="#1B5E20"/>
        <path d="M 7,110 L 9,112 L 13,108" fill="none" stroke="#FFFFFF" stroke-width="2"/>
        <text x="26" y="114" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1917">Strict Parallel Faces</text>
        <text x="26" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#78716C">Anvils clamp the bag perfectly flat</text>
      </g>
    </g>
  </g>

  <!-- CALIPER (NOT RECOMMENDED ❌) -->
  <g transform="translate(420, 160)" filter="url(#shadow)">
    <rect width="340" height="490" rx="16" fill="#FFFFFF" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="6 3"/>
    <rect width="340" height="8" rx="4" fill="#EF4444"/>

    <g transform="translate(24, 30)">
      <!-- Title & Recommended Badge -->
      <g transform="translate(0, 10)">
        <rect width="180" height="28" rx="14" fill="#FEE2E2"/>
        <text x="90" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#EF4444" text-anchor="middle">NOT RECOMMENDED &bull; ERRORS</text>
      </g>

      <text x="0" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#EF4444">Sliding Caliper</text>
      <text x="0" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#78716C">General-use measurement tool</text>

      <!-- Vector Illustration of Caliper Claws -->
      <g transform="translate(40, 120)">
        <!-- Main slide bar -->
        <rect x="-60" y="15" width="200" height="15" fill="#D6D3D1"/>
        <rect x="-60" y="5" width="10" height="35" fill="#78716C"/>
        <!-- Slider block -->
        <rect x="30" y="5" width="25" height="35" fill="#E7E5E4" stroke="#44403C" stroke-width="1"/>
        <!-- Main teeth -->
        <path d="M -60,30 L -60,65 L -45,50 L -45,30 Z" fill="#78716C"/>
        <path d="M 30,30 L 30,65 L 15,50 L 15,30 Z" fill="#44403C" transform="translate(10, 0)"/>
        <!-- Squeezed soft plastic representation (Crooked curve) -->
        <path d="M -41,30 Q -42,42 -43,55" fill="none" stroke="#EF4444" stroke-width="3"/>
        <text x="-43" y="-12" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#EF4444">Squeezed!</text>
      </g>

      <!-- Key Problems Checklist -->
      <g transform="translate(0, 260)">
        <!-- Bullet 1 -->
        <circle cx="10" cy="10" r="8" fill="#EF4444"/>
        <line x1="7" y1="7" x2="13" y2="13" stroke="#FFFFFF" stroke-width="2"/>
        <line x1="13" y1="7" x2="7" y2="13" stroke="#FFFFFF" stroke-width="2"/>
        <text x="26" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1917">Low Resolution: 0.1mm</text>
        <text x="26" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#78716C">Scale steps are too crude for thin films</text>

        <!-- Bullet 2 -->
        <circle cx="10" cy="60" r="8" fill="#EF4444"/>
        <line x1="7" y1="57" x2="13" y2="63" stroke="#FFFFFF" stroke-width="2"/>
        <line x1="13" y1="57" x2="7" y2="63" stroke="#FFFFFF" stroke-width="2"/>
        <text x="26" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1917">High Film Compression</text>
        <text x="26" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#78716C">Excessive manual jaw pressure deforms bags</text>

        <!-- Bullet 3 -->
        <circle cx="10" cy="110" r="8" fill="#EF4444"/>
        <line x1="7" y1="107" x2="13" y2="113" stroke="#FFFFFF" stroke-width="2"/>
        <line x1="13" y1="107" x2="7" y2="113" stroke="#FFFFFF" stroke-width="2"/>
        <text x="26" y="114" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1917">Tilted Measurement Claws</text>
        <text x="26" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#78716C">Claw jaw angle creates offset error</text>
      </g>
    </g>
  </g>

  <!-- Footer Banner -->
  <g transform="translate(40, 690)">
    <rect width="720" height="70" rx="12" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1"/>
    <text x="360" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0D4212" text-anchor="middle">STRICT B2B METROLOGY STANDARDS ASSURED</text>
    <text x="360" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2E7D32" text-anchor="middle">All our zipper bag thickness specifications refer to actual micrometric double-sided values.</text>
  </g>
</svg>
