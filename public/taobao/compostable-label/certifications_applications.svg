<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Card Shadow -->
    <filter id="card-shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1C1917" flood-opacity="0.05"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="#FAFAF9" rx="16"/>

  <!-- Top Ribbon Banner -->
  <path d="M 0,0 L 800,0 L 800,16 Q 800,0 784,0 Z" fill="#1B5E20" />

  <!-- Title block -->
  <g transform="translate(40, 60)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1B5E20" letter-spacing="0.1em">ACHIEVE PACK &bull; CERTIFICATIONS &amp; USES</text>
    <text x="0" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#1C1917" letter-spacing="-0.02em">Eco Custom Label Compliance &amp; Applications</text>
    <text x="0" y="56" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#78716C">Global standard-compliant bio-adhesive labels customized for premium brands</text>
  </g>

  <!-- Left Column: Global Compliance (E.E.A.T / SEO trust focus) -->
  <g transform="translate(40, 160)" filter="url(#card-shadow)">
    <rect width="340" height="420" rx="12" fill="#FFFFFF"/>
    <rect width="340" height="48" rx="12" fill="#1B5E20"/>
    <rect width="340" height="20" y="36" fill="#1B5E20"/>
    <text x="170" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">Eco Certifications &amp; Trust</text>

    <!-- Cert 1: FSC® Forest Certified -->
    <g transform="translate(20, 72)">
      <circle cx="20" cy="20" r="16" fill="#E8F5E9"/>
      <path d="M 12,20 L 17,25 L 28,14" fill="none" stroke="#1B5E20" stroke-width="2.5"/>
      <text x="52" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1C1917">FSC® Forest Certified</text>
      <text x="52" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#78716C">Sourced from strictly managed</text>
      <text x="52" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#78716C">renewable, sustainable forests.</text>
    </g>

    <!-- Cert 2: TÜV OK Compost -->
    <g transform="translate(20, 152)">
      <circle cx="20" cy="20" r="16" fill="#E8F5E9"/>
      <path d="M 12,20 L 17,25 L 28,14" fill="none" stroke="#1B5E20" stroke-width="2.5"/>
      <text x="52" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1C1917">TÜV AUSTRIA OK Compost</text>
      <text x="52" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#78716C">Certified Home and Industrial</text>
      <text x="52" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#78716C">biodegradable under EN 13432.</text>
    </g>

    <!-- Cert 3: FDA Food-Grade Compliant -->
    <g transform="translate(20, 232)">
      <circle cx="20" cy="20" r="16" fill="#EBF3FC"/>
      <path d="M 12,20 L 17,25 L 28,14" fill="none" stroke="#4A90E2" stroke-width="2.5"/>
      <text x="52" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1C1917">FDA Food-Grade Compliant</text>
      <text x="52" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#78716C">FDA 21 CFR 175.105 certified</text>
      <text x="52" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#78716C">for indirect contact with food.</text>
    </g>

    <!-- Cert 4: SGS & ISO 9001 -->
    <g transform="translate(20, 312)">
      <circle cx="20" cy="20" r="16" fill="#EBF3FC"/>
      <path d="M 12,20 L 17,25 L 28,14" fill="none" stroke="#4A90E2" stroke-width="2.5"/>
      <text x="52" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1C1917">SGS Heavy Metal Free &amp; ISO</text>
      <text x="52" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#78716C">ISO 9001 Quality Management and</text>
      <text x="52" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#78716C">SGS chemical migration limits check.</text>
    </g>
  </g>

  <!-- Right Column: B2B Brand Applications -->
  <g transform="translate(420, 160)" filter="url(#card-shadow)">
    <rect width="340" height="420" rx="12" fill="#FFFFFF"/>
    <rect width="340" height="48" rx="12" fill="#4A90E2"/>
    <rect width="340" height="20" y="36" fill="#4A90E2"/>
    <text x="170" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">Application Scenarios</text>

    <!-- App 1: Organic Food & Beverages -->
    <g transform="translate(20, 72)">
      <circle cx="20" cy="20" r="16" fill="#E8F5E9"/>
      <text x="20" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" fill="#1B5E20" text-anchor="middle">🌱</text>
      <text x="52" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1C1917">Organic Food &amp; Coffee</text>
      <text x="52" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#78716C">Perfect for packaging labels on coffee</text>
      <text x="52" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#78716C">bags, organic snacks, tea tins, and spices.</text>
    </g>

    <!-- App 2: Natural Cosmetics & Skincare -->
    <g transform="translate(20, 152)">
      <circle cx="20" cy="20" r="16" fill="#E8F5E9"/>
      <text x="20" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" fill="#1B5E20" text-anchor="middle">🧴</text>
      <text x="52" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1C1917">Natural Cosmetics &amp; Soaps</text>
      <text x="52" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#78716C">Beautiful premium matte finish labels for</text>
      <text x="52" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#78716C">shampoos, lotions, essential oils, and bars.</text>
    </g>

    <!-- App 3: Retail & Shipping Labels -->
    <g transform="translate(20, 232)">
      <circle cx="20" cy="20" r="16" fill="#EBF3FC"/>
      <text x="20" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" fill="#4A90E2" text-anchor="middle">📦</text>
      <text x="52" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1C1917">Retail &amp; Eco Shipping</text>
      <text x="52" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#78716C">Sustainable shipping addresses, price tags,</text>
      <text x="52" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#78716C">barcodes, and security seal stickers.</text>
    </g>

    <!-- App 4: Zero Waste Branding -->
    <g transform="translate(20, 312)">
      <circle cx="20" cy="20" r="16" fill="#EBF3FC"/>
      <text x="20" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" fill="#4A90E2" text-anchor="middle">♻️</text>
      <text x="52" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1C1917">Zero Waste Sustainable Brands</text>
      <text x="52" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#78716C">Matches green circular branding campaigns</text>
      <text x="52" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#78716C">to highlight 100% sustainable values.</text>
    </g>
  </g>

  <!-- Bottom Factory Strengths Overview -->
  <g transform="translate(40, 600)" filter="url(#card-shadow)">
    <rect width="720" height="90" rx="12" fill="#FFFFFF"/>
    <!-- Strength 1 -->
    <g transform="translate(20, 20)">
      <text x="0" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#1B5E20">21+</text>
      <text x="0" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1917">Years Experience</text>
      <text x="0" y="56" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#78716C">OEM &amp; ODM Specialist</text>
    </g>
    <!-- Divider -->
    <line x1="160" y1="20" x2="160" y2="70" stroke="#E8F5E9" stroke-width="2"/>
    <!-- Strength 2 -->
    <g transform="translate(180, 20)">
      <text x="0" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#1B5E20">48 hrs</text>
      <text x="0" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1917">Fast Dispatch</text>
      <text x="0" y="56" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#78716C">For urgent custom batch orders</text>
    </g>
    <!-- Divider -->
    <line x1="340" y1="20" x2="340" y2="70" stroke="#E8F5E9" stroke-width="2"/>
    <!-- Strength 3 -->
    <g transform="translate(360, 20)">
      <text x="0" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#4A90E2">HP Indigo</text>
      <text x="0" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1917">Digital Presses</text>
      <text x="0" y="56" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#78716C">Ultra-high resolution CMYK print</text>
    </g>
    <!-- Divider -->
    <line x1="520" y1="20" x2="520" y2="70" stroke="#E8F5E9" stroke-width="2"/>
    <!-- Strength 4 -->
    <g transform="translate(540, 20)">
      <text x="0" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#4A90E2">Refund</text>
      <text x="0" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1917">Guarantee</text>
      <text x="0" y="56" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#78716C">Free re-runs if unsatisfied</text>
    </g>
  </g>

  <!-- Bottom Footer -->
  <g transform="translate(40, 710)">
    <rect width="720" height="50" rx="10" fill="#EBF3FC" stroke="#B3E5FC" stroke-width="1"/>
    <text x="360" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#0D47A1" text-anchor="middle">TRUSTED GLOBAL EXPORTER &bull; ZERO PLASTIC COMPLIANCE FOR EUROPE &amp; USA</text>
  </g>
</svg>
