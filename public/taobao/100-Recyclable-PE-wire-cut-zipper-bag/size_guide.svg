<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Card Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1C1917" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="#FAFAF9" rx="16"/>

  <!-- Top Ribbon -->
  <path d="M 0,0 L 800,0 L 800,16 Q 800,0 784,0 Z" fill="#1B5E20" />

  <!-- Header -->
  <g transform="translate(40, 60)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1B5E20" letter-spacing="0.1em">ACHIEVE PACK &bull; MEASUREMENT PRINCIPLES</text>
    <text x="0" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#1C1917" letter-spacing="-0.02em">Zipper Bag Size &amp; Dimension Guide</text>
    <text x="0" y="56" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#78716C">Understanding product page size specifications (Width &times; Total Length)</text>
  </g>

  <!-- Left Side: Visual Dimension Diagram -->
  <g transform="translate(40, 160)">
    <!-- Main Box -->
    <rect width="360" height="490" rx="16" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5" filter="url(#shadow)"/>
    
    <!-- Vector Pouch -->
    <g transform="translate(50, 70)">
      <!-- Transparent Pouch outline -->
      <rect x="0" y="0" width="180" height="260" rx="8" fill="#E8F5E9" fill-opacity="0.25" stroke="#78716C" stroke-width="2"/>
      
      <!-- Zipper Track -->
      <rect x="6" y="36" width="168" height="5" rx="1" fill="#4A90E2" opacity="0.8"/>
      
      <!-- Arrow Lines for Width -->
      <path d="M -15,0 L -15,260" stroke="#1C1917" stroke-width="1"/>
      <path d="M -20,0 L -10,0 M -20,260 L -10,260" stroke="#1C1917" stroke-width="1"/>
      
      <!-- Vertical Dimension Arrow: Total Length -->
      <g transform="translate(-15, 130)">
        <polygon points="0,-130 -4,-120 4,-120" fill="#1C1917"/>
        <polygon points="0,130 -4,120 4,120" fill="#1C1917"/>
      </g>
      <text x="-25" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1917" transform="rotate(-90, -25, 135)" text-anchor="middle">TOTAL LENGTH</text>

      <!-- Horizontal Dimension Arrow: Width -->
      <path d="M 0,285 L 180,285" stroke="#1C1917" stroke-width="1"/>
      <path d="M 0,280 L 0,290 M 180,280 L 180,290" stroke="#1C1917" stroke-width="1"/>
      <g transform="translate(90, 285)">
        <polygon points="-90,0 -80,-4 -80,4" fill="#1C1917"/>
        <polygon points="90,0 80,-4 80,4" fill="#1C1917"/>
      </g>
      <text x="90" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1C1917" text-anchor="middle">BAG WIDTH</text>

      <!-- Ziplock Flap Arrow -->
      <path d="M 205,0 L 205,36" stroke="#4A90E2" stroke-width="1.5"/>
      <path d="M 200,0 L 210,0 M 200,36 L 210,36" stroke="#4A90E2" stroke-width="1.5"/>
      <g transform="translate(205, 18)">
        <polygon points="0,-18 -3,-12 3,-12" fill="#4A90E2"/>
        <polygon points="0,18 -3,12 3,12" fill="#4A90E2"/>
      </g>
      <text x="215" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#4A90E2">Top Flap</text>

      <!-- Usable Length Arrow -->
      <path d="M 205,36 L 205,260" stroke="#1B5E20" stroke-width="1.5"/>
      <path d="M 200,260 L 210,260" stroke="#1B5E20" stroke-width="1.5"/>
      <g transform="translate(205, 148)">
        <polygon points="0,-112 -3,-104 3,-104" fill="#1B5E20"/>
        <polygon points="0,112 -3,104 3,104" fill="#1B5E20"/>
      </g>
      <text x="218" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#1B5E20">Usable Space</text>
    </g>
  </g>

  <!-- Right Side: Explanation and standard data table -->
  <g transform="translate(420, 160)" filter="url(#shadow)">
    <!-- Standard Card container -->
    <rect width="340" height="490" rx="16" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="1.5"/>
    <rect width="340" height="8" rx="4" fill="#1B5E20"/>

    <g transform="translate(24, 36)">
      <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1C1917">Measurement Formulas</text>
      
      <!-- Bullet 1 -->
      <circle cx="4" cy="28" r="3" fill="#1B5E20"/>
      <text x="16" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1917">Total Length Spec:</text>
      <text x="16" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#78716C">Measured edge-to-edge (from top lip to bottom).</text>

      <!-- Bullet 2 -->
      <circle cx="4" cy="78" r="3" fill="#1B5E20"/>
      <text x="16" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1B5E20">Usable Length Calculation:</text>
      <text x="16" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-style="italic" fill="#0D4212">Usable Space = Total Length - Top Flap Flange</text>

      <!-- Flap Reference Table Title -->
      <text x="0" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#1C1917">Standard Flap (Flange) Sizes</text>

      <!-- Table Header -->
      <g transform="translate(0, 160)">
        <rect width="292" height="32" rx="4" fill="#E8F5E9"/>
        <text x="12" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#0D4212">Total Bag Size Range</text>
        <text x="280" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#0D4212" text-anchor="end">Flap Size</text>
      </g>

      <!-- Row 1 -->
      <g transform="translate(0, 202)">
        <text x="12" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#1C1917">1.5 &times; 2.5 cm &mdash; 5 &times; 7 cm</text>
        <text x="280" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1917" text-anchor="end">~0.5 cm</text>
        <line x1="12" y1="28" x2="280" y2="28" stroke="#F5F5F4" stroke-width="1"/>
      </g>

      <!-- Row 2 -->
      <g transform="translate(0, 242)">
        <text x="12" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#1C1917">6 &times; 8 cm &mdash; 10 &times; 15 cm</text>
        <text x="280" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1917" text-anchor="end">~0.8 cm</text>
        <line x1="12" y1="28" x2="280" y2="28" stroke="#F5F5F4" stroke-width="1"/>
      </g>

      <!-- Row 3 -->
      <g transform="translate(0, 282)">
        <text x="12" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#1C1917">11 &times; 16 cm &mdash; 17 &times; 25 cm</text>
        <text x="280" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1917" text-anchor="end">~1.2 cm</text>
        <line x1="12" y1="28" x2="280" y2="28" stroke="#F5F5F4" stroke-width="1"/>
      </g>

      <!-- Row 4 -->
      <g transform="translate(0, 322)">
        <text x="12" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#1C1917">18 &times; 26 cm &mdash; 28 &times; 40 cm</text>
        <text x="280" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1C1917" text-anchor="end">~1.8 cm</text>
        <line x1="12" y1="28" x2="280" y2="28" stroke="#F5F5F4" stroke-width="1"/>
      </g>

      <!-- Quality Warning Tip -->
      <g transform="translate(0, 375)">
        <rect width="292" height="60" rx="8" fill="#FFF9C4" stroke="#FFF59D" stroke-width="1"/>
        <text x="12" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#F57F17">TOLERANCE NOTICE:</text>
        <text x="12" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5D4037">Slight mechanical variation of &amp;plusmn;1-3mm is standard</text>
        <text x="12" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5D4037">during thermal wire-cut manufacturing.</text>
      </g>
    </g>
  </g>

  <!-- Footer Banner -->
  <g transform="translate(40, 690)">
    <rect width="720" height="70" rx="12" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1"/>
    <text x="360" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0D4212" text-anchor="middle">CHOOSE THE PERFECT SPEC FOR YOUR PRODUCTS</text>
    <text x="360" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2E7D32" text-anchor="middle">Make sure to factor in the Ziplock Flap size when calculating bulk storage requirements.</text>
  </g>
</svg>
